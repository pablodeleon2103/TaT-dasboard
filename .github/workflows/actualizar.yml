name: Actualizar Dashboard Percapita

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '0 21 * * 1-5'
    - cron: '0 22 * * 1-5'
    - cron: '0 23 * * 1-5'
    - cron: '0 0  * * 2-6'
    - cron: '0 1  * * 2-6'
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install pandas requests numpy

      - name: Actualizar dashboard
        env:
          CSV_URL: https://nueva.percapita.mx/api/creditos/reporte/export/csv
        run: python actualizar_github_actions.py

      - name: Instalar Staticrypt
        run: npm install -g staticrypt

      - name: Proteger dashboard con contraseña
        run: |
          staticrypt index.html \
            --password "${{ secrets.STATICRYPT_PASSWORD }}" \
            --remember 30 \
            --template-title "Percapita — Servicio al Cliente" \
            --template-instructions "Ingresa la contraseña para acceder al dashboard" \
            --template-color-primary "#1a4a8a" \
            --template-color-secondary "#3d9be8"
          mv encrypted/index.html index.html
          rm -rf encrypted

      - name: Publicar dashboard actualizado
        run: |
          git config user.name  "Dashboard Bot"
          git config
